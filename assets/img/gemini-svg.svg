<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 120" width="100%" height="auto">
  <defs>
    <!-- Gradiente Cobalto (Estructura principal de la muela) -->
    <linearGradient id="azulMuela" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#3730a3" />
    </linearGradient>
    <!-- Gradiente Cian (Contorno y brillo anatómico) -->
    <linearGradient id="cianMuela" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
  </defs>

  <!-- ISOTIPO: Muela Anatómica Realista y Estilizada -->
  <g transform="translate(20, 10)">
    <!-- Cuerpo Completo de la Muela (Corona con 4 cúspides y 2 raíces definidas) -->
    <path d="M 50,12 
             C 38,12 32,16 26,14 
             C 18,12 12,20 12,32 
             C 12,48 18,58 24,70 
             C 28,78 28,95 32,102 
             C 33,104 36,104 36,101 
             C 36,92 38,82 44,74 
             C 47,70 49,70 50,70 
             C 51,70 53,70 56,74 
             C 62,82 64,92 64,101 
             C 64,104 67,104 68,102 
             C 72,95 72,78 76,70 
             C 82,58 88,48 88,32 
             C 88,20 82,12 74,14 
             C 68,16 62,12 50,12 Z" 
          fill="url(#azulMuela)" />
    
    <!-- Línea de Brillo y Relieve Anatómico Izquierdo -->
    <path d="M 26,18 C 20,17 17,22 17,32 C 17,45 22,54 28,64" 
          fill="none" stroke="url(#cianMuela)" stroke-width="4" stroke-linecap="round" opacity="0.85" />
          
    <!-- Sombra de la Corona Superior (Cúspides) -->
    <path d="M 32,22 C 40,26 44,26 50,20 C 56,26 60,26 68,22" 
          fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  </g>

  <!-- TEXTO: Únicamente el Nombre Oficial del Negocio -->
  <g transform="translate(135, 0)">
    <text x="0" y="68" font-family="'Inter', 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#0f172a" letter-spacing="0.5">DEPÓSITO DENTAL</text>
    <p>
	<text x="325" y="68" font-family="'Inter', 'Segoe UI', sans-serif" font-size="34" font-weight="300" fill="#4f46e5" letter-spacing="0.5">SAN LORENZO</text>
	<p/>
  </g>
</svg>
